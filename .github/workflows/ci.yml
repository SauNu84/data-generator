name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datagen
          POSTGRES_PASSWORD: datagen
          POSTGRES_DB: datagen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datagen -d datagen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://datagen:datagen@localhost:5432/datagen
      REDIS_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      S3_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: synthetic-data

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Create MinIO bucket
        run: |
          pip install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 s3 mb s3://synthetic-data --region us-east-1 || true

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=json -m "not slow and not e2e"

      - name: Check backend coverage threshold (≥80%)
        run: |
          python3 -c "
          import json, sys
          with open('coverage.json') as f:
              data = json.load(f)
          pct = data['totals']['percent_covered']
          print(f'Backend coverage: {pct:.1f}%')
          if pct < 80:
              print('ERROR: coverage {:.1f}% is below the 80% threshold'.format(pct))
              sys.exit(1)
          "

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend-test:
    name: Frontend tests + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run component tests with coverage
        working-directory: frontend
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":70,"branches":60,"functions":70,"statements":70}}'

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e-test:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datagen
          POSTGRES_PASSWORD: datagen
          POSTGRES_DB: datagen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datagen -d datagen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://datagen:datagen@localhost:5432/datagen
      REDIS_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      S3_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: synthetic-data
      BASE_URL: http://localhost:3000
      API_URL: http://localhost:8000
      # Skip sending real confirmation emails in CI
      TEST_SKIP_EMAIL_VERIFY: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Create MinIO bucket
        run: |
          pip install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 s3 mb s3://synthetic-data --region us-east-1 || true

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Start backend
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: postgresql+asyncpg://datagen:datagen@localhost:5432/datagen

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend
        working-directory: frontend
        run: npm run start -- -p 3000 &

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for services to be ready
        run: |
          npx wait-on http://localhost:8000/health http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E tests
        run: npx playwright test tests/e2e/auth/ --reporter=junit,html
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: playwright-results.xml
          retention-days: 7

  stripe-webhook-test:
    name: Stripe webhook integration tests
    runs-on: ubuntu-latest
    needs: [backend-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datagen
          POSTGRES_PASSWORD: datagen
          POSTGRES_DB: datagen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datagen -d datagen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      stripe-mock:
        image: stripe/stripe-mock:latest
        ports:
          - 12111:12111

    env:
      DATABASE_URL: postgresql+asyncpg://datagen:datagen@localhost:5432/datagen
      REDIS_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      STRIPE_SECRET_KEY: sk_test_mock
      STRIPE_WEBHOOK_SECRET: whsec_mock
      STRIPE_API_BASE: http://localhost:12111

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run Stripe webhook tests
        run: pytest tests/test_billing_webhooks.py -v

  docker-build:
    name: Docker build verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
