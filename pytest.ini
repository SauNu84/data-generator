[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -q
    --strict-markers
markers =
    unit: pure unit tests, no I/O
    integration: requires running API server or test client
    e2e: end-to-end Playwright tests (requires full stack)
    slow: SDV model fitting — skipped in fast mode
    phase1: requires SAU-99 backend routes (app/main.py)
    phase1_frontend: requires SAU-100 frontend + SAU-101 Docker Compose
