<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="720" fill="#f9fafb"/>

  <!-- Header bar -->
  <rect width="1200" height="60" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="24" y="36" font-size="15" font-weight="600" fill="#111827">Synthetic Data Generator</text>
  <rect x="184" y="22" width="36" height="18" rx="9" fill="#f3f4f6"/>
  <text x="202" y="35" font-size="11" font-weight="500" fill="#6b7280" text-anchor="middle">Free</text>
  <!-- Nav right -->
  <text x="980" y="36" font-size="13" font-weight="500" fill="#4f46e5">+ New Dataset</text>
  <text x="1060" y="36" font-size="13" fill="#6b7280">user@example.com</text>
  <text x="1158" y="36" font-size="13" fill="#9ca3af">Sign out</text>

  <!-- Free tier usage bar -->
  <rect x="24" y="76" width="1152" height="52" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="40" y="99" font-size="13" font-weight="500" fill="#92400e">Free tier limit reached (10 generations/month).</text>
  <text x="40" y="116" font-size="12" fill="#b45309">Upgrade to Pro for $49/month — unlimited generations, API access, and more.</text>
  <rect x="1060" y="83" width="104" height="32" rx="6" fill="#d97706"/>
  <text x="1112" y="104" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Upgrade to Pro</text>

  <!-- Usage line -->
  <text x="24" y="156" font-size="13" fill="#6b7280">This month: <tspan font-weight="600" fill="#111827">10 / 10</tspan> generations used.</text>

  <!-- Section header -->
  <text x="24" y="196" font-size="15" font-weight="600" fill="#111827">Your Datasets <tspan font-size="13" font-weight="400" fill="#9ca3af">(4 total)</tspan></text>

  <!-- Table -->
  <rect x="24" y="212" width="1152" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Table header -->
  <rect x="24" y="212" width="1152" height="40" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="237" font-size="11" font-weight="500" fill="#6b7280" letter-spacing="0.05em">FILE</text>
  <text x="420" y="237" font-size="11" font-weight="500" fill="#6b7280" letter-spacing="0.05em">ROWS</text>
  <text x="560" y="237" font-size="11" font-weight="500" fill="#6b7280" letter-spacing="0.05em">JOBS</text>
  <text x="700" y="237" font-size="11" font-weight="500" fill="#6b7280" letter-spacing="0.05em">CREATED</text>
  <text x="1080" y="237" font-size="11" font-weight="500" fill="#6b7280" letter-spacing="0.05em">ACTIONS</text>

  <!-- Row 1 -->
  <line x1="24" y1="252" x2="1176" y2="252" stroke="#f3f4f6" stroke-width="1"/>
  <text x="40" y="278" font-size="13" font-weight="500" fill="#111827">customers_2024_q4.csv</text>
  <!-- PII badge -->
  <rect x="262" y="264" width="60" height="18" rx="9" fill="#fee2e2"/>
  <text x="292" y="277" font-size="10" font-weight="500" fill="#dc2626" text-anchor="middle">PII detected</text>
  <text x="420" y="278" font-size="13" fill="#4b5563">85,420</text>
  <text x="560" y="278" font-size="13" fill="#4b5563">3</text>
  <text x="700" y="278" font-size="13" fill="#6b7280">Apr 3, 2026</text>
  <text x="1060" y="278" font-size="13" fill="#4f46e5">Re-generate</text>
  <text x="1136" y="278" font-size="13" fill="#ef4444">Delete</text>

  <!-- Row 2 -->
  <line x1="24" y1="295" x2="1176" y2="295" stroke="#f3f4f6" stroke-width="1"/>
  <text x="40" y="321" font-size="13" font-weight="500" fill="#111827">orders_sample.csv</text>
  <text x="420" y="321" font-size="13" fill="#4b5563">12,000</text>
  <text x="560" y="321" font-size="13" fill="#4b5563">7</text>
  <text x="700" y="321" font-size="13" fill="#6b7280">Apr 3, 2026</text>
  <text x="1060" y="321" font-size="13" fill="#4f46e5">Re-generate</text>
  <text x="1136" y="321" font-size="13" fill="#ef4444">Delete</text>

  <!-- Row 3 -->
  <line x1="24" y1="338" x2="1176" y2="338" stroke="#f3f4f6" stroke-width="1"/>
  <text x="40" y="364" font-size="13" font-weight="500" fill="#111827">hr_employees_2023.csv</text>
  <text x="420" y="364" font-size="13" fill="#4b5563">4,200</text>
  <text x="560" y="364" font-size="13" fill="#4b5563">2</text>
  <text x="700" y="364" font-size="13" fill="#6b7280">Apr 2, 2026</text>
  <text x="1060" y="364" font-size="13" fill="#4f46e5">Re-generate</text>
  <text x="1136" y="364" font-size="13" fill="#ef4444">Delete</text>

  <!-- Row 4 -->
  <line x1="24" y1="381" x2="1176" y2="381" stroke="#f3f4f6" stroke-width="1"/>
  <text x="40" y="407" font-size="13" font-weight="500" fill="#111827">transactions_fintech.csv</text>
  <text x="420" y="407" font-size="13" fill="#4b5563">50,000</text>
  <text x="560" y="407" font-size="13" fill="#4b5563">1</text>
  <text x="700" y="407" font-size="13" fill="#6b7280">Apr 2, 2026</text>
  <text x="1060" y="407" font-size="13" fill="#4f46e5">Re-generate</text>
  <text x="1136" y="407" font-size="13" fill="#ef4444">Delete</text>

  <!-- Empty rows placeholder -->
  <line x1="24" y1="424" x2="1176" y2="424" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="24" y1="467" x2="1176" y2="467" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="24" y1="510" x2="1176" y2="510" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="24" y1="553" x2="1176" y2="553" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Pagination -->
  <rect x="24" y="612" width="80" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="64" y="633" font-size="13" fill="#4b5563" text-anchor="middle">Previous</text>
  <text x="600" y="633" font-size="13" fill="#6b7280" text-anchor="middle">Page 1 of 1</text>
  <rect x="1092" y="612" width="60" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="1122" y="633" font-size="13" fill="#4b5563" text-anchor="middle">Next</text>

  <!-- Version badge -->
  <text x="24" y="700" font-size="11" fill="#9ca3af">v0.2.0 — Phase 2 Commercial Platform</text>
</svg>
