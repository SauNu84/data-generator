<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="620" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="100" y="60" width="600" height="500" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Header -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827">Synthetic Data Generator</text>

  <!-- Section title -->
  <text x="130" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Schema Review</text>
  <text x="130" y="118" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">customers.csv · 45,230 rows · 6 columns detected</text>

  <!-- Table header -->
  <rect x="120" y="130" width="560" height="34" rx="6" fill="#f8fafc"/>
  <text x="140" y="151" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280">COLUMN</text>
  <text x="340" y="151" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280">DETECTED TYPE</text>
  <text x="510" y="151" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280">OVERRIDE</text>

  <!-- Table rows -->
  <!-- Row 1 -->
  <rect x="120" y="164" width="560" height="38" rx="0" fill="white"/>
  <line x1="120" y1="202" x2="680" y2="202" stroke="#f1f5f9" stroke-width="1"/>
  <text x="140" y="187" font-family="monospace, sans-serif" font-size="12" fill="#1e293b">customer_id</text>
  <rect x="330" y="172" width="80" height="22" rx="11" fill="#dbeafe"/>
  <text x="370" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1d4ed8">id</text>
  <rect x="498" y="172" width="80" height="22" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="538" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">id ▾</text>

  <!-- Row 2 -->
  <rect x="120" y="202" width="560" height="38" rx="0" fill="white"/>
  <line x1="120" y1="240" x2="680" y2="240" stroke="#f1f5f9" stroke-width="1"/>
  <text x="140" y="225" font-family="monospace, sans-serif" font-size="12" fill="#1e293b">age</text>
  <rect x="330" y="210" width="90" height="22" rx="11" fill="#dcfce7"/>
  <text x="375" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">numerical</text>
  <rect x="498" y="210" width="80" height="22" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="538" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">numerical ▾</text>

  <!-- Row 3 -->
  <rect x="120" y="240" width="560" height="38" fill="#fafafa"/>
  <line x1="120" y1="278" x2="680" y2="278" stroke="#f1f5f9" stroke-width="1"/>
  <text x="140" y="263" font-family="monospace, sans-serif" font-size="12" fill="#1e293b">email</text>
  <rect x="330" y="248" width="90" height="22" rx="11" fill="#fce7f3"/>
  <text x="375" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">categorical</text>
  <rect x="498" y="248" width="80" height="22" rx="6" fill="#6366f1" stroke="none"/>
  <text x="538" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white">categorical ▾</text>

  <!-- Row 4 -->
  <rect x="120" y="278" width="560" height="38" fill="white"/>
  <line x1="120" y1="316" x2="680" y2="316" stroke="#f1f5f9" stroke-width="1"/>
  <text x="140" y="301" font-family="monospace, sans-serif" font-size="12" fill="#1e293b">signup_date</text>
  <rect x="330" y="286" width="90" height="22" rx="11" fill="#fef9c3"/>
  <text x="375" y="301" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#854d0e">datetime</text>
  <rect x="498" y="286" width="80" height="22" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="538" y="301" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">datetime ▾</text>

  <!-- Row 5 -->
  <rect x="120" y="316" width="560" height="38" fill="#fafafa"/>
  <line x1="120" y1="354" x2="680" y2="354" stroke="#f1f5f9" stroke-width="1"/>
  <text x="140" y="339" font-family="monospace, sans-serif" font-size="12" fill="#1e293b">country</text>
  <rect x="330" y="324" width="90" height="22" rx="11" fill="#fce7f3"/>
  <text x="375" y="339" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">categorical</text>
  <rect x="498" y="324" width="80" height="22" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="538" y="339" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">categorical ▾</text>

  <!-- Row 6 -->
  <rect x="120" y="354" width="560" height="38" fill="white"/>
  <text x="140" y="377" font-family="monospace, sans-serif" font-size="12" fill="#1e293b">revenue</text>
  <rect x="330" y="362" width="90" height="22" rx="11" fill="#dcfce7"/>
  <text x="375" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">numerical</text>
  <rect x="498" y="362" width="80" height="22" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="538" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">numerical ▾</text>

  <!-- Controls -->
  <rect x="120" y="410" width="260" height="70" rx="10" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="140" y="430" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Rows to generate (max 100k)</text>
  <rect x="140" y="440" width="220" height="32" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="250" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">45,230</text>
  <text x="140" y="490" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Source file: 45,230 rows</text>

  <!-- Model toggle -->
  <rect x="400" y="410" width="260" height="70" rx="10" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="420" y="430" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Model</text>
  <rect x="420" y="440" width="110" height="32" rx="6" fill="#6366f1"/>
  <text x="475" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">GaussianCopula</text>
  <rect x="530" y="440" width="110" height="32" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="585" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">CTGAN</text>
  <text x="420" y="490" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Faster · better for numeric data</text>

  <!-- Generate button -->
  <rect x="120" y="500" width="430" height="44" rx="10" fill="#6366f1"/>
  <text x="335" y="527" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Generate Synthetic Data</text>

  <rect x="560" y="500" width="120" height="44" rx="10" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="620" y="527" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#6b7280">Upload new file</text>
</svg>
