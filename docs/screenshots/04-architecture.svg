<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">System Architecture</text>

  <!-- User -->
  <rect x="30" y="200" width="90" height="50" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="75" y="221" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18">👤</text>
  <text x="75" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Browser</text>

  <!-- Arrow: User → Frontend -->
  <line x1="120" y1="225" x2="158" y2="225" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="139" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#818cf8">:3000</text>

  <!-- Frontend box -->
  <rect x="160" y="170" width="120" height="110" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="220" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6366f1">FRONTEND</text>
  <text x="220" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Next.js 15</text>
  <text x="220" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Upload page</text>
  <text x="220" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Schema review</text>
  <text x="220" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Results + polling</text>

  <!-- Arrow: Frontend → API -->
  <line x1="280" y1="225" x2="318" y2="225" stroke="#6366f1" stroke-width="1.5"/>
  <polygon points="316,220 324,225 316,230" fill="#6366f1"/>
  <text x="299" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#818cf8">REST</text>
  <text x="299" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">:8000</text>

  <!-- API box -->
  <rect x="320" y="170" width="120" height="110" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
  <text x="380" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0ea5e9">API</text>
  <text x="380" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">FastAPI + async</text>
  <text x="380" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">POST /datasets</text>
  <text x="380" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">POST /jobs</text>
  <text x="380" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">GET /jobs/{id}</text>

  <!-- Arrow: API → Worker (via Redis) -->
  <line x1="440" y1="225" x2="478" y2="225" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="476,220 484,225 476,230" fill="#f59e0b"/>
  <text x="459" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">queue</text>

  <!-- Worker box -->
  <rect x="480" y="170" width="120" height="110" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">WORKER</text>
  <text x="540" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Celery + SDV</text>
  <text x="540" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">GaussianCopula</text>
  <text x="540" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">CTGAN</text>
  <text x="540" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Quality scoring</text>

  <!-- Arrow: Worker → MinIO -->
  <line x1="540" y1="280" x2="540" y2="318" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="535,316 540,324 545,316" fill="#10b981"/>
  <text x="560" y="305" font-family="system-ui, sans-serif" font-size="9" fill="#10b981">store CSV</text>

  <!-- MinIO box -->
  <rect x="480" y="325" width="120" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="540" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#10b981">MinIO</text>
  <text x="540" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">S3-compatible · 24h TTL</text>

  <!-- Redis box -->
  <rect x="320" y="325" width="120" height="60" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="380" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444">Redis</text>
  <text x="380" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Job queue + results</text>

  <!-- Postgres box -->
  <rect x="160" y="325" width="120" height="60" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="220" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa">PostgreSQL</text>
  <text x="220" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Datasets + jobs</text>

  <!-- Arrow: API → Postgres -->
  <line x1="380" y1="280" x2="380" y2="325" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="280" x2="220" y2="325" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="280" x2="380" y2="280" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow: API → Redis -->
  <line x1="380" y1="280" x2="380" y2="325" stroke="#ef4444" stroke-width="1"/>
  <polygon points="375,323 380,331 385,323" fill="#ef4444"/>

  <!-- Docker Compose label -->
  <rect x="135" y="145" width="495" height="270" rx="16" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="382" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">docker compose up  ·  7 services  ·  single command</text>

  <!-- Legend -->
  <text x="660" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b">Tech Stack</text>
  <rect x="660" y="190" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="678" y="201" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Next.js 15</text>
  <rect x="660" y="210" width="12" height="12" rx="2" fill="#0ea5e9"/>
  <text x="678" y="221" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">FastAPI</text>
  <rect x="660" y="230" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="678" y="241" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Celery + SDV</text>
  <rect x="660" y="250" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="678" y="261" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Redis</text>
  <rect x="660" y="270" width="12" height="12" rx="2" fill="#a78bfa"/>
  <text x="678" y="281" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">PostgreSQL</text>
  <rect x="660" y="290" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="678" y="301" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">MinIO (S3)</text>
</svg>
